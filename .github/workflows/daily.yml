name: Daily Stock Note

on:
  schedule:
    # 12:00 UTC = 8:00pm SGT = ~8:00am US Eastern (during EDT) - lands right
    # in the US pre-market window (4:00am-9:30am ET), Mon-Fri
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis and send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python analyze.py

      - name: Commit updated watchlist
        run: |
          git config user.name "stock-agent-bot"
          git config user.email "actions@github.com"
          git add portfolio.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update watchlist $(date +%Y-%m-%d)"
            git push
          else
            echo "No watchlist changes to commit."
          fi
